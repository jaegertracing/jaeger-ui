name: 'Lint and Build'

on:
  merge_group:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event.pull_request && github.event.pull_request.number) || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-node-and-deps
      - name: Verify lockfile is in sync
        run: |
          pnpm install --lockfile-only
          git diff --exit-code pnpm-lock.yaml || (echo '❌ pnpm-lock.yaml is out of sync with package.json. Run "pnpm install" locally and commit the result.' && exit 1)
      - run: pnpm list -r --depth Infinity
      - name: Run depcheck
        run: make depcheck
      - run: make lint
      - run: make build
      - name: Ensure PR is not on main branch
        uses: jaegertracing/jaeger/.github/actions/block-pr-from-main-branch@main

  validate-3rd-party-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: validate Forking Renovate Bot config
        run: |
          docker run \
            -v $PWD/renovate.json:/usr/src/app/renovate.json \
            ghcr.io/renovatebot/renovate:latest \
            renovate-config-validator

      - name: validate Codecov config
        run: |
          RESPONSE=$(curl -s --data-binary @.codecov.yml https://codecov.io/validate)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "Valid"

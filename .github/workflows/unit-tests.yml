name: 'Unit Tests'

on:
  merge_group:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event.pull_request && github.event.pull_request.number) || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          node-version-file: 'package.json'
      - name: Upgrade npm
        run: |
          NPM_VERSION=$(node -p "require('./package.json').engines.npm.replace(/[^0-9.]/g, '')")
          npm install -g npm@$NPM_VERSION
      - run: npm --version
      - run: npm ci
      - name: Verify package tree
        # @typescript-eslint declares `typescript: ">=4.8.4 <6.0.0"` in its peer deps, which
        # TypeScript 6.0 violates. Until @typescript-eslint releases TypeScript 6 support, allow
        # this specific violation while still failing on any other `npm ls` issues.
        # TODO: Remove this workaround once @typescript-eslint adds TypeScript 6.0 peer dep support.
        run: |
          set +e
          npm ls --all 2>/tmp/npm-ls-errors.txt
          EXIT=$?
          cat /tmp/npm-ls-errors.txt >&2
          if [ $EXIT -ne 0 ]; then
            UNEXPECTED=$(grep "^npm error" /tmp/npm-ls-errors.txt \
              | grep -Ev "^npm error code ELSPROBLEMS$|invalid: typescript@6\.|extraneous:|A complete log" || true)
            [ -z "$UNEXPECTED" ] || { echo "Unexpected npm ls errors:"; echo "$UNEXPECTED"; exit 1; }
            echo "Only known npm ls violations found; continuing."
          fi
      - run: npm run coverage
      - name: Upload coverage to codecov.io
        uses: codecov/codecov-action@fdcc8476540edceab3de004e990f80d881c6cc00 # v5.5.0
        with:
          fail_ci_if_error: true
          verbose: true
          # Using upload token helps against rate limiting errors.
          # Cannot define it as secret as we need it accessible from forks.
          # See https://github.com/codecov/codecov-action/issues/837
          token: 31c3122b-7b49-4267-a117-8c9354a97119

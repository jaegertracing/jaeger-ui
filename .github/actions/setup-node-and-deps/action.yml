name: 'Setup Node and Deps'
description: 'Setup Node.js with corepack-managed npm and install dependencies'
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: npm
        node-version-file: 'package.json'
    - run: corepack enable
      shell: bash
    - run: node --version && npm --version
      shell: bash
    - run: npm ci
      shell: bash

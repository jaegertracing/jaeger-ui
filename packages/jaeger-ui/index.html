<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- prevent caching of this HTML by any server, Go or otherwise -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <!-- The document MUST have a <base> element, see ./README.md -->
    <script>
      (function () {
        var knownSubPaths = [
          '/deep-dependencies',
          '/dependencies',
          '/quality-metrics',
          '/plexus-demo',
          '/monitor',
          '/search',
          '/trace/',
          '/trace',
        ];
        var path = window.location.pathname || '/';
        var bestIdx = -1;
        for (var i = 0; i < knownSubPaths.length; i++) {
          var idx = path.lastIndexOf(knownSubPaths[i]);
          if (idx !== -1 && idx > bestIdx) bestIdx = idx;
        }
        var prefix =
          bestIdx !== -1
            ? path.slice(0, bestIdx + 1) || '/'
            : path.slice(0, path.lastIndexOf('/') + 1) || '/';
        if (prefix[prefix.length - 1] !== '/') prefix += '/';
        var safe = prefix.replace(/[&"<>]/g, '');
        document.currentScript.insertAdjacentHTML(
          'afterend',
          '<base href="' + safe + '" data-inject-target="BASE_URL" />'
        );
        document.addEventListener('DOMContentLoaded', function () {
          var root = document.getElementById('jaeger-ui-root');
          if (root && !root.hasChildNodes()) {
            root.textContent = 'Jaeger UI did not load. Unknown or invalid path: ' + path;
          }
        });
      })();
    </script>
    <link rel="shortcut icon" href="favicon.ico" />
    <title>Jaeger UI</title>
    <script>
      // Jaeger UI config data is embedded by Jaeger backend via search-replace.
      // Please see ./README.md#configuration for details.

      // TODO the JSON/JS bifurcation below could be avoided by using a single template function like:
      // function getJaegerUiConfig() { return null; }

      // Important! Do not alter the following line; Jaeger looks for that exact pattern.
      // JAEGER_CONFIG_JS

      function getJaegerUiConfig() {
        if (typeof window.UIConfig === 'function') {
          return UIConfig();
        }
        const DEFAULT_CONFIG = null;
        // Important! Do not alter the following line; Jaeger looks for that exact pattern.
        const JAEGER_CONFIG = DEFAULT_CONFIG;
        return JAEGER_CONFIG;
      }
      // Jaeger storage compabilities data is embedded by the query-service via search-replace.
      function getJaegerStorageCapabilities() {
        const DEFAULT_STORAGE_CAPABILITIES = { archiveStorage: false, metricsStorage: false };
        const JAEGER_STORAGE_CAPABILITIES = DEFAULT_STORAGE_CAPABILITIES;
        return JAEGER_STORAGE_CAPABILITIES;
      }
      // Jaeger version data is embedded by Jaeger backend via search/replace.
      function getJaegerVersion() {
        const DEFAULT_VERSION = { gitCommit: '', gitVersion: '', buildDate: '' };
        // Important! Do not alter the following line; Jaeger looks for that exact pattern.
        const JAEGER_VERSION = DEFAULT_VERSION;
        return JAEGER_VERSION;
      }

      // Workaround some legacy NPM dependencies that assume this is always defined.
      window.global = {};
    </script>
  </head>
  <body>
    <div id="jaeger-ui-root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
